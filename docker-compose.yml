version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: biltybook-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: biltybook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biltybook-backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/biltybook
      API_HOST: 0.0.0.0
      API_PORT: 8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python main.py

volumes:
  postgres_data:
